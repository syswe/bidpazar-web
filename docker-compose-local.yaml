services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
      - "40000-40100:40000-40100/udp"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - PORT_SOCKET=3001
      - MEDIASOUP_ANNOUNCED_IP=192.168.1.5
      - MEDIASOUP_MIN_PORT=40000
      - MEDIASOUP_MAX_PORT=40100
      # App URLs for local development
      - APP_URL=http://localhost:3000
      - API_URL=http://localhost:3000/api
      - BACKEND_API_URL=http://localhost:3000/api
      - SOCKET_URL=ws://localhost:3001
      - WEBRTC_SERVER=http://localhost:3001
      - WS_URL=/socket.io/
      # Next.js public environment variables
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - NEXT_PUBLIC_SOCKET_URL=ws://localhost:3001
      - NEXT_PUBLIC_WEBRTC_SERVER=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=/socket.io/
      # TURN/STUN server configuration
      - NEXT_PUBLIC_TURN_SERVER_URL=turn:localhost:3478
      - NEXT_PUBLIC_STUN_SERVER_URL=stun:localhost:3478
      - TURN_SERVER_URL=turn:localhost:3478
      - STUN_SERVER_URL=stun:localhost:3478
      - MEDIASOUP_LISTEN_IP=0.0.0.0
      - PYTHONUNBUFFERED=1
    depends_on:
      - coturn
    command: node server.js

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    environment:
      - TURN_USERNAME=bidpazar
      - TURN_PASSWORD=bidpazarpass
      - TURN_REALM=bidpazar.com
      - EXTERNAL_IP=192.168.1.5
    command: >
      --log-file=stdout
      --lt-cred-mech
      --fingerprint
      --no-cli
      --no-tls
      --no-dtls
      --realm=bidpazar.com
      --user=bidpazar:bidpazarpass
