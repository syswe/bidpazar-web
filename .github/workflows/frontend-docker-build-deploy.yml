name: Frontend Build and Deploy Docker Image

on:
  push:
    branches: [main]
    paths:
      - "**"
      - ".github/workflows/frontend-docker-build-deploy.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get VERSION and commit SHA
        id: get-version
        run: |
          VERSION=$(cat VERSION)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_TAG=$VERSION-$SHORT_SHA" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            arcanteus/bidpazar-web:${{ env.IMAGE_TAG }}
            arcanteus/bidpazar-web:${{ env.VERSION }}

      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: 207.180.247.20
          username: ${{ secrets.VM_SSH_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /root/bp
            sed -i "s|arcanteus/bidpazar-web:.*|arcanteus/bidpazar-web:${{ env.IMAGE_TAG }}|g" docker-compose.yaml
            docker compose pull && docker compose up -d
