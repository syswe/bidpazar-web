version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bidpazar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bidpazar_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bidpazar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PORT_SOCKET=3001
      - DATABASE_URL=postgresql://user:password@postgres:5432/bidpazar?schema=public
      - NEXT_PUBLIC_APP_URL=https://bidpazar.com
      - NEXT_PUBLIC_API_URL=https://bidpazar.com/api
      - SOCKET_URL=wss://socket.bidpazar.com
      - NEXT_PUBLIC_SOCKET_URL=wss://socket.bidpazar.com
    ports:
      - "3000:3000"  # Next.js
      - "3001:3001"  # Socket.IO
    networks:
      - bidpazar_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nextjs
    networks:
      - bidpazar_network

networks:
  bidpazar_network:
    driver: bridge

volumes:
  postgres_data: 