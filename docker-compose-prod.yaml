version: '3.8'

services:
  web:
    image: arcanteus/bidpazar-web:0.2
    restart: always
    ports:
      - "3000:3000"
      # RTMP port for streaming
      - "1935:1935"
      # HTTP port for HLS
      - "8000:8000"
    env_file:
      - ./bidpazar-web/.env.docker
    environment:
      - PORT=3000
      - RTMP_SERVER_HOST=${EXTERNAL_IP:-45.147.46.183}
      - NEXT_PUBLIC_RTMP_SERVER_HOST=${EXTERNAL_IP:-45.147.46.183}
      - FFMPEG_PATH=/usr/bin/ffmpeg
    volumes:
      - ./uploads:/app/public/uploads
      - ./hls:/app/public/hls
    networks:
      - shared-network
    depends_on:
      - coturn

  coturn:
    image: coturn/coturn:latest
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    environment:
      - TURN_USERNAME=bidpazar
      - TURN_PASSWORD=bidpazarpass
      - TURN_REALM=bidpazar.com
      - EXTERNAL_IP=45.147.46.183
    command: >
      --log-file=stdout
      --lt-cred-mech
      --fingerprint
      --no-cli
      --no-tls
      --no-dtls
      --realm=bidpazar.com
      --user=bidpazar:bidpazarpass
    networks:
      - shared-network

networks:
  shared-network:
    external: true
